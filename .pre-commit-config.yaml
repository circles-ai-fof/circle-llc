# Pre-commit hooks — M8.2
#
# Install:
#   pip install pre-commit
#   pre-commit install
#
# Manual run:
#   pre-commit run --all-files
#
# Bypass (NO recomendado, solo emergencias):
#   git commit --no-verify

repos:
  # ----- File hygiene -----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: '^\.github/workflows/'  # GH Actions usa multi-doc YAML
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ----- Secret detection -----
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ----- Python linting (optional, install ruff) -----
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["--fix"]
        files: '^orchestrator/.+\.py$'

  # ----- Custom local hook: never commit .env -----
  - repo: local
    hooks:
      - id: no-env-file
        name: Block .env from being committed
        language: system
        entry: bash -c 'if git diff --cached --name-only | grep -qE "(^|/)\.env$"; then echo "ERROR: .env file detected in commit. Add to .gitignore."; exit 1; fi'
        pass_filenames: false
        always_run: true

      - id: no-anthropic-key
        name: Block ANTHROPIC_API_KEY values
        language: system
        entry: bash -c 'if git diff --cached -U0 | grep -qE "sk-ant-api[0-9]+-[A-Za-z0-9_-]+"; then echo "ERROR: Anthropic API key detected in diff."; exit 1; fi'
        pass_filenames: false
        always_run: true

      - id: no-openai-key
        name: Block OPENAI_API_KEY values
        language: system
        entry: bash -c 'if git diff --cached -U0 | grep -qE "sk-(proj-)?[A-Za-z0-9_-]{40,}"; then echo "ERROR: Possible OpenAI key in diff."; exit 1; fi'
        pass_filenames: false
        always_run: true
