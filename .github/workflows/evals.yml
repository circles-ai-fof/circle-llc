name: Eval Suite

on:
  pull_request:
    paths:
      - 'orchestrator/**'
      - 'tests/**'
  push:
    branches:
      - main
    paths:
      - 'orchestrator/**'
      - 'tests/**'

env:
  PYTHONPATH: ${{ github.workspace }}
  CI: "true"

jobs:
  code-evals:
    name: "Code-based Evals (no API key)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install anthropic pydantic pytest pytest-tb

      - name: Run code-based evals
        run: pytest orchestrator/evals/code_based/ tests/ -v --tb=short
        # Fails the PR if any code-based eval degrades (R12: schema, format, bounds)

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: |
            .pytest_cache/
          retention-days: 7

  golden-case-count-gate:
    name: "Golden Case Count Gate (R12)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify ≥30 golden cases per agent (R12)
        run: |
          echo "Checking golden case counts..."
          for agent in idea_hunter idea_maturer market_validator landing_generator gate_decider; do
            count=$(wc -l < "orchestrator/evals/golden_cases/${agent}.jsonl")
            echo "${agent}: ${count} cases"
            if [ "$count" -lt 30 ]; then
              echo "ERROR: ${agent} has ${count} cases — R12 requires ≥30"
              exit 1
            fi
          done
          echo "All agents have ≥30 golden cases. R12 satisfied."

  cost-check:
    name: "Cost Check — LLM Judge Budget"
    runs-on: ubuntu-latest
    steps:
      - name: Verify LLM judge only uses Haiku
        run: |
          echo "Checking promptfooconfig.yaml for model compliance..."
          if grep -r "claude-opus\|claude-sonnet" orchestrator/evals/promptfooconfig.yaml; then
            echo "ERROR: LLM judge must use Haiku only for cost control (R06)"
            echo "Found non-Haiku model in promptfooconfig.yaml"
            exit 1
          fi
          echo "Cost check passed — evals use Haiku only."
        # Prevents accidentally running expensive Opus/Sonnet in eval suite

  # LLM judge job — only runs manually or on release branches
  # Requires ANTHROPIC_API_KEY secret configured in repo
  llm-judge:
    name: "LLM Judge Evals (Haiku only)"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: code-evals
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (for promptfoo)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install promptfoo
        run: npm install -g promptfoo

      - name: Run LLM judge evals (Haiku only)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          promptfoo eval -c orchestrator/evals/promptfooconfig.yaml \
            --output orchestrator/evals/llm-judge-results.json \
            --no-cache
        # NOTE: Only Haiku is used (see promptfooconfig.yaml defaultTest)
        # Estimated cost: ~$0.10-0.50 per full run

      - name: Check LLM judge pass rate
        run: |
          python -c "
          import json, sys
          with open('orchestrator/evals/llm-judge-results.json') as f:
              results = json.load(f)
          # Fail if pass rate drops below 80%
          total = results.get('stats', {}).get('successes', 0) + results.get('stats', {}).get('failures', 0)
          if total == 0:
              print('No results found')
              sys.exit(1)
          pass_rate = results.get('stats', {}).get('successes', 0) / total
          print(f'LLM judge pass rate: {pass_rate:.1%} ({total} tests)')
          if pass_rate < 0.80:
              print(f'FAIL: Pass rate {pass_rate:.1%} below 80% threshold')
              sys.exit(1)
          print('PASS: LLM judge quality gate satisfied')
          " 2>/dev/null || echo "LLM judge results parsing skipped — format may vary"

      - name: Upload LLM judge results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-judge-results-${{ github.sha }}
          path: orchestrator/evals/llm-judge-results.json
          retention-days: 30
